<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/formfuncionario.css">
    <title>Registro</title>
</head>
<body>
  <form action="">
    <div class="divPrincipal">
        <div class="title">
          Registro Cliente
        </div>
        <div class="form">
           <div class="inputfield">
              <label>Nome produto:</label>
              <input type="text" class="input" id="nome" name="nome" autofocus>
           </div>  
            <div class="inputfield">
              <label>Código</label>
              <input type="text" class="input" id="codigo" name="codigo">
           </div>  
           <div class="inputfield">
              <label>Tipo de produto</label>
              <input type="text" class="input" id="tipe" name="tipe">
           </div>  
          <div class="inputfield">
              <label>Preço:</label>
              <input type="text" class="input" id="preco" name="preco">
           </div> 
          
            
          <div class="inputfield">
              <label>Quantidade em estoque:</label>
              <input type="text" class="input" id="estoque" name="estoque">
           </div> 
          <div class="inputfield">
              <label>Nome do funcionario:</label>
              <input type="text" class="input" id="nomeFuncio" name="nomeFuncio">
           </div> 
          <div class="inputfield">
              <label>codigo do funcionario:</label>
              <input type="text" class="input" id="codFuncio" name="cod Funcio">
           </div> 
           
          <div class="inputfield terms">
              <label class="check">
                <input type="checkbox">
                <span class="checkmark"></span>
              </label>
              <p>Eu Aceito os termos e condicões!</p>
           </div> 
          <div class="inputfield">
            <input type="submit" value="Registrar" class="btn" onclick="cadastro()">
          </div>
          <div class="inputfield">
            <input type="submit" value="buscar" class="btn" onclick="buscar()">
          </div>
          <div class="inputfield">
            <input type="submit" value="consultar" class="btn" onclick="CaptarDados()">
          </div>
          <textarea name="listarprod" id="listarprod" cols="30" rows="10"></textarea>
        </div>
    </div>
  </form>
    <script src="JavaScript/formfuncio.js"></script>
</body>
</html>
